<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

<h2>Student Registration Form</h2>

<form action="success.html" method="post">

<fieldset>

<legend>Student Details</legend>

<label>Name:</label>

<input type="text"
placeholder="Enter Name"
required>

<br><br>

<label>Email:</label>

<input type="email"
placeholder="Enter Email"
required>

<br><br>

<label>Password:</label>

<input type="password"
placeholder="Enter Password"
required>

<br><br>

<label>Age:</label>

<input type="number">

<br><br>

<label>Gender:</label>

<input type="radio"
name="gender">Male

<input type="radio"
name="gender">Female

<br><br>

<label>Skills:</label>

<input type="checkbox">Java

<input type="checkbox">Python

<input type="checkbox">SQL

<br><br>

<label>Upload Resume:</label>

<input type="file">

<br><br>

<input type="submit">

<input type="reset">

</fieldset>

</form>

</body>
</html>
