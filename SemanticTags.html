<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping</title>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>ABC Online Store</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">Products</a> |
        <a href="#">Offers</a> |
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content -->
    <main>

        <!-- Product Section -->
        <section>
            <h2>Today's Deals</h2>

            <!-- Product Article -->
            <article>
                <h3>Samsung Galaxy S25</h3>

                <figure>
                    <img src="phone.jpg" alt="Samsung Phone" width="200">
                    <figcaption>Samsung Galaxy S25</figcaption>
                </figure>

                <p>Price: ₹75,000</p>
            </article>

            <!-- Product Article -->
            <article>
                <h3>Apple MacBook Air</h3>

                <figure>
                    <img src="laptop.jpg" alt="MacBook" width="200">
                    <figcaption>Apple MacBook Air</figcaption>
                </figure>

                <p>Price: ₹1,10,000</p>
            </article>

        </section>

        <!-- Sidebar -->
        <aside>
            <h3>Top Categories</h3>

            <ul>
                <li>Mobiles</li>
                <li>Laptops</li>
                <li>Headphones</li>
                <li>Smart Watches</li>
            </ul>
        </aside>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 ABC Online Store</p>
        <p>Email: support@abconlinestore.com</p>
    </footer>

</body>
</html>
